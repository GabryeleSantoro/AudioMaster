name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          chmod +x Scripts/run-tests.sh
          ./Scripts/run-tests.sh

  release:
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"

            if [[ "$VERSION" == *"-build."* ]]; then
              echo "Use semver release tags (for example v1.0.0), not build tags." >&2
              exit 1
            fi

            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "dmg_name=AudioMaster-${VERSION}.dmg" >> "$GITHUB_OUTPUT"
            echo "release_dmg=1" >> "$GITHUB_OUTPUT"
            echo "make_latest=legacy" >> "$GITHUB_OUTPUT"
            echo "release_name=AudioMaster ${VERSION}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(xcodebuild -showBuildSettings -project AudioMaster.xcodeproj -scheme AudioMaster -configuration Release 2>/dev/null | awk -F' = ' '/ MARKETING_VERSION / {print $2; exit}')
            TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"

            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "dmg_name=AudioMaster-${VERSION}-build.${GITHUB_RUN_NUMBER}.dmg" >> "$GITHUB_OUTPUT"
            echo "release_dmg=0" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "release_name=AudioMaster ${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_DMG: ${{ steps.meta.outputs.release_dmg }}
        run: |
          chmod +x Scripts/build-dmg.sh
          ./Scripts/build-dmg.sh "${{ steps.meta.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            Automated release from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            **Version:** ${{ steps.meta.outputs.version }}
            **Build:** ${{ github.run_number }}
            **Tag:** ${{ steps.meta.outputs.tag }}
          files: build/${{ steps.meta.outputs.dmg_name }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
