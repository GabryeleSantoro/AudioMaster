name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          chmod +x Scripts/run-tests.sh
          ./Scripts/run-tests.sh

  release:
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"

            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Use semver release tags (for example v0.0.2), not build tags." >&2
              exit 1
            fi
          else
            latest="$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
            if [[ -z "$latest" ]]; then
              VERSION="0.0.2"
            else
              IFS=. read -r major minor patch <<< "${latest#v}"
              VERSION="${major}.${minor}.$((patch + 1))"
            fi
            TAG="v${VERSION}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=AudioMaster-${VERSION}.dmg" >> "$GITHUB_OUTPUT"
          echo "release_name=AudioMaster ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x Scripts/build-dmg.sh
          ./Scripts/build-dmg.sh "${{ steps.meta.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            Automated release from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            **Version:** ${{ steps.meta.outputs.version }}
            **Tag:** ${{ steps.meta.outputs.tag }}
          files: build.noindex/${{ steps.meta.outputs.dmg_name }}
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
