<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AudioMaster — the free audio control center for macOS.">
  <title>AudioMaster — Free audio control for macOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/icon.png" type="image/png">
</head>
<body>
  <div class="page">
    <main class="hero">
      <div class="hero__glow" aria-hidden="true"></div>
      <img class="hero__icon" src="assets/icon.png" width="96" height="96" alt="AudioMaster app icon">
      <h1 class="hero__brand">AudioMaster</h1>
      <p class="hero__tagline">The free audio control center for macOS.</p>
      <div class="hero__ctas">
        <a class="btn btn--primary" href="https://github.com/GabryeleSantoro/AudioMaster/releases/latest" target="_blank" rel="noopener noreferrer">Download for Mac</a>
        <a class="btn btn--bmc" href="https://www.buymeacoffee.com/gabryelesantoro" target="_blank" rel="noopener noreferrer">
          <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" width="200" height="56">
        </a>
      </div>
      <p class="hero__note">Requires macOS 14.2+</p>
    </main>
    <footer class="footer">
      <a href="https://github.com/GabryeleSantoro/AudioMaster" target="_blank" rel="noopener noreferrer">Open source on GitHub</a>
      <span class="footer__credit">Made for the Mac community</span>
    </footer>
  </div>
</body>
</html>
